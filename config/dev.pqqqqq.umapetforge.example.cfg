## UmaPetForge example configuration
## Copy values into BepInEx/config/dev.pqqqqq.umapetforge.cfg, which is
## generated after the plugin loads once.

[General]

## Comma-separated UmaViewer character names or numeric character IDs.
## Fresh installs start empty; use the F6 picker inside UmaViewer.
Characters =

## Optional per-character Mini costume IDs managed by the F6 picker.
## Leave empty to use Auto / character default for every selected Uma.
## Format: characterId=costumeId;characterId=costumeId
CharacterCostumes =

## Relative output folder beneath the directory containing UmaViewer.exe.
OutputDirectory = UmaPetForge_Output

## Keep individual sampled PNG frames alongside each assembled atlas.
WriteIndividualFrames = true

## Optional CSV beside UmaViewer.exe with character_id,state,motion_key_or_path rows.
## Missing file or comments-only file keeps the automatic default motions.
MotionOverridesFile = UmaPetForge_Overrides.csv
