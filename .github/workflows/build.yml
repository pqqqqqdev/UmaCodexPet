name: Build UmaCodexPet

on:
  push:
    branches: [main, master, "release/v*"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
    inputs:
      uma_viewer_url:
        description: Optional UmaViewer.zip URL used only for compile-time managed references
        required: false
        type: string

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      publish_release: ${{ steps.version.outputs.publish_release }}
    env:
      DEFAULT_UMAVIEWER_URL: https://github.com/katboi01/UmaViewer/releases/latest/download/UmaViewer.zip

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download compile-time references
        shell: pwsh
        env:
          REQUESTED_UMAVIEWER_URL: ${{ inputs.uma_viewer_url }}
          GH_TOKEN: ${{ github.token }}
        run: |
          $viewerUrl = $env:REQUESTED_UMAVIEWER_URL
          if ([string]::IsNullOrWhiteSpace($viewerUrl)) {
            $viewerUrl = $env:DEFAULT_UMAVIEWER_URL
          }

          $viewerArchive = Join-Path $env:RUNNER_TEMP "UmaViewer.zip"
          $viewerExtract = Join-Path $env:RUNNER_TEMP "UmaViewer"
          Invoke-WebRequest $viewerUrl -OutFile $viewerArchive
          Expand-Archive $viewerArchive -DestinationPath $viewerExtract -Force
          $viewerExe = Get-ChildItem $viewerExtract -Filter UmaViewer.exe -File -Recurse | Select-Object -First 1
          if (-not $viewerExe) {
            throw "UmaViewer.exe was not present in the downloaded archive."
          }

          $releaseHeaders = @{
            Accept = "application/vnd.github+json"
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $release = Invoke-RestMethod "https://api.github.com/repos/BepInEx/BepInEx/releases/latest" -Headers $releaseHeaders
          $asset = $release.assets | Where-Object { $_.name -match '^BepInEx_win_x64_.*\.zip$' } | Select-Object -First 1
          if (-not $asset) {
            throw "The latest BepInEx release has no Windows x64 Mono archive."
          }
          $bepArchive = Join-Path $env:RUNNER_TEMP "BepInEx.zip"
          Invoke-WebRequest $asset.browser_download_url -OutFile $bepArchive -Headers $releaseHeaders
          Expand-Archive $bepArchive -DestinationPath $viewerExe.Directory.FullName -Force

          "UMAVIEWER_DIR=$($viewerExe.Directory.FullName)" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set build version
        id: version
        shell: pwsh
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
        run: |
          [xml]$project = Get-Content "src/UmaCodexPet/UmaCodexPet.csproj"
          $projectVersion = [string]($project.Project.PropertyGroup.VersionPrefix | Select-Object -First 1)
          if ([string]::IsNullOrWhiteSpace($projectVersion)) {
            throw "VersionPrefix is missing from UmaCodexPet.csproj."
          }

          $pluginSource = Get-Content "src/UmaCodexPet/UmaCodexPetPlugin.cs" -Raw
          $pluginVersionMatch = [regex]::Match($pluginSource, 'PluginVersion\s*=\s*"([^"]+)"')
          if (-not $pluginVersionMatch.Success) {
            throw "PluginVersion is missing from UmaCodexPetPlugin.cs."
          }
          $pluginVersion = $pluginVersionMatch.Groups[1].Value
          if ($pluginVersion -ne $projectVersion) {
            throw "Version mismatch: csproj=$projectVersion, plugin=$pluginVersion."
          }

          $publishRelease = "false"
          $releaseFromBranch = $false
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME.TrimStart("v")
            $publishRelease = "true"
          } elseif ($env:GITHUB_REF -like "refs/heads/release/v*") {
            $version = $env:GITHUB_REF_NAME.Substring("release/v".Length)
            $publishRelease = "true"
            $releaseFromBranch = $true

            $headers = @{
              Accept = "application/vnd.github+json"
              Authorization = "Bearer $env:GH_TOKEN"
              "X-GitHub-Api-Version" = "2022-11-28"
            }
            $defaultRef = Invoke-RestMethod `
              "https://api.github.com/repos/$env:GITHUB_REPOSITORY/git/ref/heads/$env:DEFAULT_BRANCH" `
              -Headers $headers
            if ($defaultRef.object.sha -ne $env:GITHUB_SHA) {
              throw "Release branches must point exactly at the current $env:DEFAULT_BRANCH commit."
            }
          } else {
            $version = "$projectVersion-ci.${{ github.run_number }}"
          }

          if ($publishRelease -eq "true") {
            if ($version -notmatch '^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$') {
              throw "Release version '$version' does not match the supported format."
            }
            $sourceVersion = $version.Split("-")[0]
            if ($sourceVersion -ne $projectVersion) {
              throw "Release version v$version does not match source version $projectVersion."
            }

            if ($releaseFromBranch) {
              $tagStatus = 0
              $null = Invoke-RestMethod `
                "https://api.github.com/repos/$env:GITHUB_REPOSITORY/git/ref/tags/v$version" `
                -Headers $headers `
                -SkipHttpErrorCheck `
                -StatusCodeVariable tagStatus
              if ([int]$tagStatus -eq 200) {
                throw "Tag v$version already exists; refusing to replace published release assets."
              }
              if ([int]$tagStatus -ne 404) {
                throw "Could not verify tag v$version (GitHub returned HTTP $tagStatus)."
              }
            }
          }

          $notesVersion = $projectVersion
          if ($publishRelease -eq "true") {
            $notesVersion = $version
          }

          "VERSION=$version" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "notes_version=$notesVersion" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "publish_release=$publishRelease" | Out-File $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate curated release notes
        shell: pwsh
        run: ./scripts/extract_release_notes.ps1 -Version "${{ steps.version.outputs.notes_version }}" -OutputPath "$env:RUNNER_TEMP/release-notes.md"

      - name: Build and package
        shell: pwsh
        run: ./scripts/build.ps1 -UmaViewerDir "$env:UMAVIEWER_DIR" -Version "$env:VERSION"

      - name: Create release archive
        shell: pwsh
        run: |
          $archive = "artifacts/UmaCodexPet-$env:VERSION.zip"
          Compress-Archive -Path "artifacts/package/*" -DestinationPath $archive -Force
          $checksum = "$archive.sha256"
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $archive -Leaf)" | Set-Content $checksum -Encoding ascii
          "RELEASE_ARCHIVE=$archive" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_CHECKSUM=$checksum" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - uses: actions/upload-artifact@v4
        with:
          name: UmaCodexPet-${{ env.VERSION }}
          path: |
            ${{ env.RELEASE_ARCHIVE }}
            ${{ env.RELEASE_CHECKSUM }}
          if-no-files-found: error

  release:
    if: needs.build.outputs.publish_release == 'true'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ needs.build.outputs.version }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare curated release notes
        shell: pwsh
        run: ./scripts/extract_release_notes.ps1 -Version "${{ needs.build.outputs.version }}" -OutputPath "release-notes.md"

      - name: Refuse to overwrite an existing release tag
        if: github.ref_type == 'branch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v${{ needs.build.outputs.version }}
        run: |
          status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG")"
          case "$status" in
            404) ;;
            200) echo "::error title=Release tag already exists::$RELEASE_TAG already exists; refusing to overwrite its assets."; exit 1 ;;
            *) echo "::error title=Tag preflight failed::GitHub returned HTTP $status."; exit 1 ;;
          esac

      - uses: actions/download-artifact@v4
        with:
          pattern: UmaCodexPet-*
          path: release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          fail_on_unmatched_files: true
          body_path: release-notes.md
          name: UmaCodexPet v${{ needs.build.outputs.version }}
          overwrite_files: false
          prerelease: ${{ contains(needs.build.outputs.version, '-') }}
          tag_name: v${{ needs.build.outputs.version }}
          target_commitish: ${{ github.sha }}
